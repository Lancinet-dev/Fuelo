name: Backup Neon DB

on:
  schedule:
    - cron: '0 3 * * *'   # 3h UTC chaque nuit
  workflow_dispatch:        # déclenchement manuel depuis GitHub Actions

jobs:
  backup:
    name: pg_dump → artifact
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      # postgresql-client-17 n'est PAS dans les dépôts Ubuntu par défaut du
      # runner → il faut d'abord ajouter le dépôt officiel PostgreSQL (PGDG),
      # sinon `apt-get install postgresql-client-17` échoue ("package introuvable")
      # et tout le backup plante (cause des échecs quotidiens jusqu'au 2026-06-12).
      - name: Installer postgresql-client 17 (Neon = PostgreSQL 17 — pg_dump doit être ≥ version serveur)
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-common
          sudo /usr/share/postgresql-common/pgdg/apt.postgresql.org.sh -y
          sudo apt-get install -y --no-install-recommends postgresql-client-17
          pg_dump --version

      - name: Dump de la base Neon
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          DATE=$(date +%Y-%m-%d)
          FILENAME="fuelo_backup_${DATE}.dump"
          pg_dump "$DATABASE_URL" \
            --no-password \
            --format=custom \
            --compress=9 \
            --file="$FILENAME"
          echo "BACKUP_FILE=$FILENAME" >> $GITHUB_ENV
          SIZE=$(du -sh "$FILENAME" | cut -f1)
          echo "✅ Backup créé : $FILENAME ($SIZE)"

      - name: Upload artifact (30 jours)
        uses: actions/upload-artifact@v4
        with:
          name: fuelo-backup-${{ github.run_number }}-${{ env.BACKUP_FILE }}
          path: ${{ env.BACKUP_FILE }}
          retention-days: 30

      - name: Résumé
        run: |
          echo "## 🗄️ Backup Fuelo — $(date +%Y-%m-%d)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Fichier** : ${{ env.BACKUP_FILE }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Format** : pg_dump custom (restaurable avec \`pg_restore\`)" >> $GITHUB_STEP_SUMMARY
          echo "- **Rétention** : 30 jours" >> $GITHUB_STEP_SUMMARY
